name: family_tracker
description: A Hajj Family Tracker app using Flutter and Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # The core Firebase connection
  firebase_core: ^2.24.2
  # The real-time database to sync locations
  firebase_database: ^10.4.0
  # To get the phone's GPS coordinates
  location: ^5.0.3
  # To display the actual map
  google_maps_flutter: ^2.5.3
  # UI icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true